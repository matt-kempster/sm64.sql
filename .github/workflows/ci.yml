name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black
        run: black --check src tests
      - name: mypy
        run: mypy
      - name: pytest
        run: pytest -q

  integration:
    # Parse a real decomp checkout end to end.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: sm64.sql
      - uses: actions/checkout@v4
        with:
          repository: n64decomp/sm64
          path: sm64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: sm64.sql
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Integration tests
        working-directory: sm64.sql
        env:
          SM64_DECOMP_PATH: ${{ github.workspace }}/sm64
        run: pytest -q tests/test_integration.py
